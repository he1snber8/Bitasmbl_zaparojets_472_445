

name: Bitasmbl Validation

on:
  push:
    branches: [main]

jobs:
  scaffold:
    if: github.event.head_commit.message == 'bitasmbl:init'
    runs-on: ubuntu-latest
    environment: BITASMBL_ENV
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Scaffold Tech
        shell: bash
        run: | 
          npx ember-cli new frontend --skip-git
      - name: Commit scaffold
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git add .
       
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "bitasmbl: scaffold project"
            git push
          else
            echo "No changes to commit"
          fi
      - name: Extract metadata from temp.json
        id: meta
        run: |
          PROJECT_APPLICATION_LINKED_REPO_ID=$(jq -r '.ProjectApplicationLinkedRepoId' temp.json)
          PROJECT_APPLICATION_ID=$(jq -r '.ProjectApplicationId' temp.json)
          OWNER_ID=$(jq -r '.OwnerId' temp.json)

          echo "project_application_linked_repo_id=$PROJECT_APPLICATION_LINKED_REPO_ID" >> $GITHUB_OUTPUT
          echo "project_application_id=$PROJECT_APPLICATION_ID" >> $GITHUB_OUTPUT
          echo "owner_id=$OWNER_ID" >> $GITHUB_OUTPUT
          
      - name: Send repo set up completion notification
        run: |
          RESPONSE=$(curl -s \
            -w "\n%{http_code}" \
            -X PUT https://2a11-176-221-143-53.ngrok-free.app/projects/application-repo-init-complete \
            -H "Content-Type: application/json" \
            -d @- <<EOF
          {
            
            "projectApplicationLinkedRepoId": ${{ steps.meta.outputs.project_application_linked_repo_id }},
            "projectApplicationId": ${{ steps.meta.outputs.project_application_id }},
            "ownerId": "${{ steps.meta.outputs.owner_id }}"
          }
          EOF
          )

          STATUS=$(echo "$RESPONSE" | tail -n1)

          echo "Error during project completion, try again later."
          echo "Response: $BODY"

          if [ "$STATUS" -ne 200 ]; then
            echo "::error::$BODY"
            exit 1
          fi

  validate:
    if: github.event.head_commit.message != 'bitasmbl:init'
    environment: BITASMBL_ENV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Validate project
        run: echo "Running Bitasmbl validation..."

      - name: Verify Token Existence
        run: |
          if [ -z "${{ secrets.BITASMBL_TOKEN }}" ]; then
            echo "TOKEN IS MISSING"
          else
            echo "TOKEN IS SET: ${{ secrets.BITASMBL_TOKEN }}"
          fi
      
      - name: Check token validity
        run: |
          RESPONSE=$(curl -s \
          -w "\n%{http_code}" \
          -X POST https://2a11-176-221-143-53.ngrok-free.app/users/check-token-validity \
          -H "Content-Type: application/json" \
          -H "Authorization: Bearer ${{ secrets.BITASMBL_TOKEN }}")

          BODY=$(echo "$RESPONSE" | sed '$d')
          STATUS=$(echo "$RESPONSE" | tail -n1)

          echo "Status: $STATUS"
          echo "Response: $BODY"

          if [ "$STATUS" -ne 200 ]; then
          echo "::error::$BODY"
          exit 1
          fi

      - name: Extract metadata from bitasmbl.json
        id: meta
        run: |
          PROJECT_APPLICATION_ID=$(jq -r '.projectApplicationId' bitasmbl.task.json)
          REQUIREMENT_ID=$(jq -r '.requirementId' bitasmbl.task.json)

          # Extract the entire activityMeta object as a compact JSON string
          ACTIVITY_DATA=$(jq -c '.activityMeta' bitasmbl.task.json)

          echo "project_application_id=$PROJECT_APPLICATION_ID" >> $GITHUB_OUTPUT
          echo "requirement_id=$REQUIREMENT_ID" >> $GITHUB_OUTPUT

          # Use a heredoc for activity_data to safely handle the JSON string
          echo "activity_data<<EOF" >> $GITHUB_OUTPUT
          echo "$ACTIVITY_DATA" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Get git diff
        id: diff
        run: |
          # Get diff and use jq to handle JSON string escaping properly
          DIFF=$(git diff HEAD^ HEAD)
          DIFF_ESCAPED=$(printf '%s' "$DIFF" | jq -Rs .)
          echo "diff=$DIFF_ESCAPED" >> $GITHUB_OUTPUT

      - name: Send to backend
        run: |
          RESPONSE=$(curl -s \
            -w "\n%{http_code}" \
            -X POST https://2a11-176-221-143-53.ngrok-free.app/projects/evaluate-code-diff \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.BITASMBL_TOKEN }}" \
            -d @- <<EOF
          {
            "projectApplicationId": ${{ steps.meta.outputs.project_application_id }},
            "requirementId": ${{ steps.meta.outputs.requirement_id }},
            "repo": "${{ github.repository }}",
            "commitSha": "${{ github.sha }}",
            "diffs": ${{ steps.diff.outputs.diff }},
            "activityMeta": ${{ steps.meta.outputs.activity_data }}
          }
          EOF
          )

          STATUS=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "Error during code evaluation, try again later."
          echo "Response: $BODY"

          if [ "$STATUS" -ne 200 ]; then
            echo "::error::$BODY"
            exit 1
          fi